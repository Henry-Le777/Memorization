<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorize</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <button class="menu-button">
            ☰
        </button>
        <div class="logo">
            <h1>Memorize</h1>
        </div>

        <div class="user-section">
            <img class="avatar hidden" alt="User avatar">
            <span class="username hidden"></span>
            <button class="auth-button">
            Sign In
            </button>
            <button class="signout-button hidden">
            Sign Out
            </button>
        </div>
    </header>

    <main class="main">

        <div class="sidebar-overlay"></div>

        <aside class="sidebar">

            <div class="sidebar-header">
                <h2 class="sidebar-title">Menu</h2>
                <button class="sidebar-close-button" aria-label="Close menu">✕</button>
            </div>

            <section class="set-list">
                <h2>Flashcard sets</h2>
            </section>

            <section class="sidebar-actions actions-control">
                <button id="btn-play" class="action-button primary" disabled>▶ Play</button>
                <div class="action-group-row">
                    <button id="btn-edit" class="action-button secondary" disabled>Edit</button>
                    <button id="btn-delete" class="action-button danger" disabled>Delete</button>
                </div>
            </section>

            <section class="sidebar-actions">
                <button class="new-set-button" id="new-set-button" disabled>
                    + New Set
                </button>
            </section>

        </aside>

        <section class="display">

        </section>

    </main>

    <div class="modal hidden">
        <div class="modal-content">

            <h2>Create New Set</h2>

            <input
                type="text"
                id="set-name-input"
                placeholder="Enter set name">

            <div class="modal-buttons">

                <button type="button" id="cancel-button">
                    Cancel
                </button>

                <button type="button" id="create-button">
                    Create
                </button>

            </div>

        </div>
    </div>
    <div class="delete-modal hidden">
        <div class="modal-content">

            <h2>Delete Flashcard Set</h2>

            <p class="delete-message">
                Are you sure you want to delete this set?
            </p>

            <div class="modal-buttons">

                <button
                    type="button"
                    id="delete-cancel-button">

                    Cancel

                </button>

                <button
                    type="button"
                    id="delete-confirm-button">

                    Delete

                </button>

            </div>

        </div>
    </div>
    <div class="rename-modal hidden">
        <div class="modal-content">

            <h2>Rename Flashcard Set</h2>

            <input
                type="text"
                id="rename-set-input"
                placeholder="New set name">

            <div class="modal-buttons">

                <button
                    type="button"
                    id="rename-cancel-button">

                    Cancel

                </button>

                <button
                    type="button"
                    id="rename-save-button">

                    Save

                </button>

            </div>

        </div>
    </div>
    <div class="import-export-modal hidden">
        <div class="modal-content">

            <h2 id="import-export-title">Import Cards</h2>

            <p class="import-export-description">
                Paste cards in <strong>question <span class="tab-symbol">[Tab]</span> answer</strong> format (one per line):
            </p>

            <textarea
                id="import-export-textarea"
                class="import-export-textarea"
                placeholder="question1	answer1&#10;question2	answer2&#10;question3	answer3"
                spellcheck="false"
                rows="8"></textarea>

            <div class="import-export-stats" id="import-export-stats"></div>

            <div class="modal-buttons">

                <button type="button" id="import-export-cancel-button">
                    Cancel
                </button>

                <button type="button" id="import-export-action-button" class="action-button primary">
                    Import
                </button>

            </div>

        </div>
    </div>
    <div class="addcard-modal hidden">
        <div class="modal-content">

            <h2>Add New Card</h2>

            <input
                type="text"
                id="card-question-input"
                placeholder="Enter question">

            <input
                type="text"
                id="card-answer-input"
                placeholder="Enter answer">

            <div class="modal-buttons">

                <button type="button" id="addcard-cancel-button">
                    Cancel
                </button>

                <button type="button" id="addcard-save-button">
                    Add
                </button>

            </div>
        </div>
    </div>
    <div class="editcard-modal hidden">

        <div class="modal-content">

            <h2>Edit Card</h2>

            <input
                type="text"
                id="edit-card-question-input"
                placeholder="Question">

            <input
                type="text"
                id="edit-card-answer-input"
                placeholder="Answer">

            <div class="modal-buttons">

                <button
                    type="button"
                    id="editcard-cancel-button">

                    Cancel

                </button>

                <button
                    type="button"
                    id="editcard-save-button">

                    Save

                </button>

            </div>

        </div>

    </div>    
    <script type="module" src="js/main.js"></script>

</body>
</html>
